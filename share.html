<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공유된 애니메이션 티어리스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%, #000000 100%);
      color: #f1f5f9;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    .anime-card-container {
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .anime-card-container img { user-drag: none; -webkit-user-drag: none; }

    .tier-ss:hover { box-shadow: 0 10px 30px -10px rgba(253, 224, 71, 0.5); border-color: rgba(253, 224, 71, 0.8); }
    .tier-s:hover  { box-shadow: 0 10px 30px -10px rgba(245, 158, 11, 0.5); border-color: rgba(245, 158, 11, 0.8); }
    .tier-a:hover  { box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.5); border-color: rgba(239, 68, 68, 0.8); }
    .tier-b:hover  { box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5); border-color: rgba(59, 130, 246, 0.8); }
    .tier-c:hover  { box-shadow: 0 10px 30px -10px rgba(156, 163, 175, 0.3); border-color: rgba(156, 163, 175, 0.6); }
    .tier-d:hover  { box-shadow: 0 10px 30px -10px rgba(107, 114, 128, 0.3); border-color: rgba(107, 114, 128, 0.6); }

    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-1 {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 공유 페이지 카드 클릭 가능 표시 */
.anime-card-container {
  cursor: pointer;
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}

.anime-card-container:hover {
  transform: translateY(-2px);
}

/* 상세 모달: 텍스트 선택 가능 */
#detailModal {
  user-select: text !important;
  -webkit-user-select: text !important;
  -moz-user-select: text !important;
  -ms-user-select: text !important;
}

  </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
  <div class="max-w-7xl mx-auto">
    <header class="mb-12 border-b border-white/10 pb-8 pt-4">
      <div class="flex flex-col md:flex-row justify-between items-start gap-6">
        <div class="flex-1 min-w-0">
          <h2 class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 font-black tracking-widest text-sm mb-2">SHARED ANIME TIER LIST</h2>
          <h1 id="report-title" class="text-4xl md:text-5xl font-black text-white mb-6 tracking-tight drop-shadow-md">공유된 티어리스트</h1>
          
          <div class="glass-panel p-4 rounded-2xl flex flex-col md:flex-row md:items-center gap-4 shadow-lg shadow-black/20">
            <div class="flex-1 min-w-0">
              <p class="text-gray-400 text-sm md:text-base font-bold mb-1 flex items-center gap-2">
                ✨ 성향 분석 <span class="w-1 h-1 rounded-full bg-gray-500 inline-block"></span> 
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-orange-400 text-base md:text-lg font-black" id="taste-profile-title">불러오는 중...</span>
              </p>
              <p id="taste-profile-desc" class="text-xs text-gray-500 leading-relaxed mt-1">잠시만 기다려주세요.</p>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="space-y-10">
      <div id="loadingState" class="text-center py-20 text-gray-400">공유된 티어리스트를 불러오는 중입니다...</div>
      <div id="errorState" class="hidden text-center py-20 text-red-400">존재하지 않거나 비공개 처리된 공유 링크입니다.</div>

      <div id="contentArea" class="hidden space-y-10">
        <section id="tiersContainer" class="space-y-8"></section>
      </div>
    </main>
  </div>

  <script>
    const SUPABASE_DB_URL = "https://gsmjwxciyigkxvwxhsop.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzbWp3eGNpeWlna3h2d3hoc29wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTEzMzQsImV4cCI6MjA4OTQ2NzMzNH0.JBOsK1kB8Y2daz0qZ61SsDlVLrjHQJY4mqR2T4QbtZA";
    const supabaseClient = supabase.createClient(SUPABASE_DB_URL, SUPABASE_ANON_KEY);

    const TIER_LABELS = {
      SS: '최애 인생작',
      S: '취향의 기준작',
      A: '강력 추천작',
      B: '인정하지만 아쉬운 작품',
      C: '취향과 어긋난 작품',
      D: '거의 안 맞는 작품'
    };
    const shareState = {
  tierList: { SS: [], S: [], A: [], B: [], C: [], D: [] }
};
const TIER_THEMES = {
  SS: { text: 'text-yellow-300', border: 'border-yellow-300/40', bgGradient: 'from-yellow-300/50' },
  S: { text: 'text-yellow-500', border: 'border-yellow-500/30', bgGradient: 'from-yellow-500/50' },
  A: { text: 'text-red-500', border: 'border-red-500/30', bgGradient: 'from-red-500/50' },
  B: { text: 'text-blue-400', border: 'border-blue-400/30', bgGradient: 'from-blue-500/50' },
  C: { text: 'text-gray-400', border: 'border-gray-600/40', bgGradient: 'from-gray-600/50' },
  D: { text: 'text-gray-500', border: 'border-gray-500/40', bgGradient: 'from-gray-500/50' }
};
    function getPlaceholderUrl(title) {
      return `https://placehold.co/300x450/1f2937/9ca3af?text=${encodeURIComponent(title || 'No Image')}&font=roboto`;
    }

    function createReadOnlyCardHtml(anime, tier) {
      const safeTitle = (anime.title || '').replace(/"/g, '&quot;');
      const safeReview = (anime.user_review || anime.ai_review || anime.recommendationReason || '리뷰 없음').replace(/"/g, '&quot;');
      const fallbackImg = getPlaceholderUrl(safeTitle);
      const imgSrc = anime.poster_url || anime.imgSrc || fallbackImg;
      
      const cardTier = tier.toLowerCase();
      let baseClass = `anime-card-container tier-${cardTier} glass-panel rounded-2xl overflow-hidden relative group flex flex-col transform hover:-translate-y-2 z-10 hover:z-20 cursor-pointer transition-all`;

      if (tier === 'C') {
        baseClass = `anime-card-container tier-c bg-gray-900/40 rounded-2xl overflow-hidden border border-white/5 opacity-60 hover:opacity-100 relative group flex flex-col transform hover:-translate-y-1 transition-all cursor-pointer`;
      } else if (tier === 'D') {
        baseClass = `anime-card-container tier-d bg-black/40 rounded-2xl overflow-hidden border border-white/5 opacity-50 hover:opacity-100 relative group flex flex-col transform hover:-translate-y-1 transition-all cursor-pointer`;
      }

      const imgTagAttr = `src="${imgSrc}" onerror="this.onerror=null; this.src='${fallbackImg}';" alt="${safeTitle}"`;

      const genres = Array.isArray(anime.genres)
        ? anime.genres
        : String(anime.genres || '').split(',').map(v => v.trim()).filter(Boolean);
      const filteredGenres = genres.filter(g => g && g !== '애니메이션');
      
      let genreBadge = '';
      if (filteredGenres && filteredGenres.length > 0) {
        const displayGenres = filteredGenres.slice(0, 2).join(', ');
        genreBadge = `<span class="inline-block bg-black/50 backdrop-blur-md text-gray-200 text-[10px] px-2 py-1 rounded-lg border border-white/10 truncate max-w-full font-medium shadow-sm">${displayGenres}</span>`;
      }

      const ratingNum = Number(anime.vote_average || anime.rating || 0);
      const ratingDisplay = ratingNum ? `⭐ ${ratingNum.toFixed(1)}` : '';

      let innerHtml = '';
      
      if (tier === 'SS' || tier === 'S') {
        innerHtml = `
          <img ${imgTagAttr} class="absolute inset-0 w-full h-full object-cover object-center transform transition-transform duration-700 group-hover:scale-110 z-0 pointer-events-none">
          <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-[#020617]/60 to-transparent opacity-90 group-hover:opacity-100 transition-opacity duration-300 z-10 pointer-events-none"></div>
          <div class="relative z-20 p-4 flex flex-col justify-end h-full min-h-[300px] pointer-events-none transform transition-transform duration-300 group-hover:-translate-y-1">
              <div class="flex justify-between items-end gap-2 mb-2 w-full">
                  <div class="flex-1 min-w-0 flex items-center gap-1">${genreBadge}</div>
                  <div class="flex-shrink-0 text-yellow-400 text-xs font-black drop-shadow-md pb-0.5">${ratingDisplay}</div>
              </div>
              <div class="h-[44px] flex flex-col justify-center w-full">
                  <h4 class="font-black text-white text-lg leading-[22px] line-clamp-2 drop-shadow-lg">${safeTitle}</h4>
              </div>
              <div class="h-[40px] mt-1.5 flex flex-col justify-center w-full">
                  <p class="text-xs text-gray-300 line-clamp-2 leading-5 opacity-90 group-hover:opacity-100">${safeReview}</p>
              </div>
          </div>`;
      } 
      else if (tier === 'A') {
        innerHtml = `
          <img ${imgTagAttr} class="absolute inset-0 w-full h-full object-cover object-center transform transition-transform duration-500 group-hover:scale-110 z-0 pointer-events-none">
          <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-[#020617]/40 to-transparent z-10 pointer-events-none"></div>
          <div class="relative z-20 p-3 flex flex-col justify-end h-full min-h-[220px] pointer-events-none">
              <div class="flex justify-between items-center gap-2 mb-1.5 w-full">
                  <div class="flex-1 min-w-0">${genreBadge}</div>
                  <div class="text-yellow-400 text-[11px] font-bold drop-shadow-md">${ratingDisplay}</div>
              </div>
              <div class="h-[24px] flex flex-col justify-center w-full">
                  <h4 class="font-bold text-gray-100 text-sm md:text-base leading-[24px] line-clamp-1 drop-shadow-md">${safeTitle}</h4>
              </div>
              <div class="h-[32px] mt-1 flex flex-col justify-center w-full">
                  <p class="text-[11px] text-red-300/90 line-clamp-2 leading-[16px] drop-shadow-md">${safeReview}</p>
              </div>
          </div>`;
      } 
      else if (tier === 'B') {
        innerHtml = `
          <img ${imgTagAttr} class="absolute inset-0 w-full h-full object-cover object-center transform transition-transform duration-500 group-hover:scale-110 z-0 pointer-events-none opacity-80 group-hover:opacity-100">
          <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-transparent opacity-90 z-10 pointer-events-none"></div>
          <div class="relative z-20 p-2.5 flex flex-col justify-end h-full min-h-[170px] pointer-events-none">
              <div class="flex justify-between items-center w-full mb-1">
                 <div class="flex-1 min-w-0">${genreBadge}</div>
                 <div class="text-yellow-400 text-[10px] font-bold drop-shadow-md">${ratingDisplay}</div>
              </div>
              <div class="h-[20px] flex flex-col justify-center w-full">
                  <h4 class="font-medium text-gray-200 text-xs md:text-sm leading-[20px] line-clamp-1 drop-shadow-md">${safeTitle}</h4>
              </div>
              <div class="h-[14px] mt-0.5 flex flex-col justify-center w-full">
                  <p class="text-[10px] text-gray-400 line-clamp-1 leading-[14px] drop-shadow-md">${safeReview}</p>
              </div>
          </div>`;
      } 
      else if (tier === 'C' || tier === 'D') {
        innerHtml = `
          <img ${imgTagAttr} class="absolute inset-0 w-full h-full object-cover object-center filter grayscale hover:grayscale-0 transition-all duration-500 z-0 pointer-events-none opacity-70 group-hover:opacity-100">
          <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-[#020617]/60 z-10 pointer-events-none transition-colors group-hover:from-[#020617]/80"></div>
          <div class="relative z-20 p-2 flex flex-col justify-center items-center h-full min-h-[140px] text-center pointer-events-none">
              <div class="h-[16px] w-full flex flex-col justify-center">
                  <span class="text-xs font-bold text-gray-300 w-full leading-[16px] line-clamp-1 drop-shadow-md">${safeTitle}</span>
              </div>
              <div class="h-[24px] mt-1 w-full flex flex-col justify-center">
                  <p class="text-[9px] text-gray-400 w-full line-clamp-2 leading-[12px] drop-shadow-md">${safeReview}</p>
              </div>
          </div>`;
      }

      return `<div class="${baseClass}" onclick="openDetailModal('${anime.id}', false)">${innerHtml}</div>`;
    }

    function renderTierSection(tier, items) {
      const theme = TIER_THEMES[tier] || {};
      const gradientClass = theme.bgGradient || 'from-white/30';
      
      let gridClass = 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6';
      if (tier === 'A') gridClass = 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-6';
      if (tier === 'B') gridClass = 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4';
      if (tier === 'C' || tier === 'D') gridClass = 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3';

      return `
        <section class="bg-gray-800/50 rounded-xl p-6 border ${theme.border || 'border-gray-700'}">
          <div class="flex items-center mb-6">
            <span class="text-4xl font-black ${theme.text || 'text-white'} mr-4 drop-shadow-md">${tier}</span>
            <div class="h-1 flex-grow bg-gradient-to-r ${gradientClass} to-transparent rounded"></div>
            <span class="${theme.text || 'text-gray-300'} font-bold ml-4 text-sm md:text-base">
              ${TIER_LABELS[tier]} (${items.length}작품)
            </span>
          </div>
          <div class="${gridClass}">
            ${items.map(item => createReadOnlyCardHtml(item, tier)).join('')}
          </div>
        </section>
      `;
    }

    async function initializeSharePage() {
      const params = new URLSearchParams(window.location.search);
      const publicId = params.get('id');

      if (!publicId) {
        showError();
        return;
      }

      try {
        const { data: meta, error: metaError } = await supabaseClient
          .from('user_meta')
          .select('*')
          .eq('public_id', publicId)
          .eq('is_public', true)
          .maybeSingle();

        if (metaError || !meta) {
          showError();
          return;
        }

        document.getElementById('report-title').innerText = `${meta.username || '사용자'}님의 티어리스트`;
        document.title = `${meta.username || '사용자'}님의 티어리스트`;
        document.getElementById('taste-profile-title').innerText =
          meta.taste_profile_title_ko
            ? `${meta.taste_profile_title_ko} (${meta.taste_profile_title_en || ''})`
            : '아직 분석되지 않음';
        document.getElementById('taste-profile-desc').innerText =
          meta.taste_profile_description || '설명 없음';

        let tierQuery = supabaseClient
          .from('tier_items')
          .select('*')
          .order('sort_order', { ascending: true });

        if (meta.user_id) {
          tierQuery = tierQuery.eq('user_id', meta.user_id);
        } else {
          tierQuery = tierQuery.eq('username', meta.username).is('user_id', null);
        }

        const { data: tierItems, error: tierError } = await tierQuery;

        if (tierError) {
          showError();
          return;
        }

        const grouped = { SS: [], S: [], A: [], B: [], C: [], D: [] };
(tierItems || []).forEach(item => {
  if (grouped[item.tier]) grouped[item.tier].push(item);
});

shareState.tierList = grouped;

const tiersContainer = document.getElementById('tiersContainer');
tiersContainer.innerHTML = ['SS', 'S', 'A', 'B', 'C', 'D']
  .map(tier => renderTierSection(tier, grouped[tier]))
  .join('');

        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('contentArea').classList.remove('hidden');
      } catch (err) {
        console.error(err);
        showError();
      }
    }

    function showError() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('contentArea').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
    }

    document.addEventListener('DOMContentLoaded', initializeSharePage);

    let currentDetailId = null;
let currentDetailIsRecommended = false;

function openDetailModal(id, isRecommended = false) {
  let foundAnime = null;

  for (const tier in shareState.tierList) {
    foundAnime = (shareState.tierList[tier] || []).find(a => String(a.id) === String(id));
    if (foundAnime) break;
  }

  if (!foundAnime) return;

  currentDetailId = id;
  currentDetailIsRecommended = false;

  const fallbackImg = getPlaceholderUrl(foundAnime.title);

  document.getElementById('detailImg').src = foundAnime.poster_url || foundAnime.imgSrc || fallbackImg;
  document.getElementById('detailImg').onerror = function () {
    this.onerror = null;
    this.src = fallbackImg;
  };

  document.getElementById('detailBadge').innerText = `${foundAnime.tier} 등급`;
  document.getElementById('detailTitle').innerText = foundAnime.title || '제목 없음';
  document.getElementById('detailOriginalTitle').innerText = foundAnime.original_title || foundAnime.originalTitle || '';
  document.getElementById('detailRating').innerText =
    (foundAnime.vote_average || foundAnime.rating)
      ? Number(foundAnime.vote_average || foundAnime.rating).toFixed(1)
      : '-';
  document.getElementById('detailDate').innerText = foundAnime.release_date || foundAnime.releaseDate || '-';
  document.getElementById('detailOverview').innerText = foundAnime.overview || '등록된 줄거리가 없습니다.';

  const genresContainer = document.getElementById('detailGenres');
  genresContainer.innerHTML = '';

  const genres = Array.isArray(foundAnime.genres)
    ? foundAnime.genres
    : String(foundAnime.genres || '').split(',').map(v => v.trim()).filter(Boolean);

  genres.forEach(genre => {
    const span = document.createElement('span');
    span.className = 'px-3 py-1 bg-gray-700 text-gray-200 text-xs rounded-lg font-medium border border-gray-600';
    span.innerText = genre;
    genresContainer.appendChild(span);
  });

  document.getElementById('detailReviewArea').classList.remove('hidden');
  document.getElementById('detailReasonArea').classList.add('hidden');
  document.getElementById('detailReviewText').innerText =
    foundAnime.user_review || foundAnime.ai_review || '작성된 한줄평이 없습니다.';

  const modal = document.getElementById('detailModal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function closeDetailModal() {
  const modal = document.getElementById('detailModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  currentDetailId = null;
  currentDetailIsRecommended = false;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeDetailModal();
  }
});
  </script>

  <!-- 공유 페이지용 작품 상세 정보 모달 -->
<div id="detailModal" onclick="if(event.target === this) closeDetailModal()" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[150] p-4 transition-opacity">
  <div class="bg-gray-800 rounded-2xl border border-gray-600 w-full max-w-5xl shadow-2xl relative overflow-hidden flex flex-col max-h-[90vh]" onclick="event.stopPropagation()">
    <button onclick="closeDetailModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white bg-gray-700/80 hover:bg-gray-600 p-2 rounded-full transition-colors z-20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <div class="flex flex-col md:flex-row h-full overflow-y-auto">
      <div class="w-full md:w-2/5 flex-shrink-0 bg-gray-900 relative">
        <img id="detailImg" src="" alt="포스터" class="w-full h-auto md:h-full object-cover border-b md:border-b-0 md:border-r border-gray-700">
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-gray-900 to-transparent p-6 pt-20">
          <span id="detailBadge" class="px-3 py-1 bg-blue-600 text-white font-bold rounded-lg shadow-lg text-sm"></span>
        </div>
      </div>

      <div class="w-full md:w-3/5 p-6 md:p-10 flex flex-col bg-gray-800">
        <div class="mb-6">
          <div id="detailGenres" class="flex flex-wrap gap-2 mb-3"></div>
          <h2 id="detailTitle" class="text-3xl md:text-4xl font-black text-white leading-tight mb-2">제목</h2>
          <p id="detailOriginalTitle" class="text-base text-gray-400 italic mb-6">원제</p>

          <div class="flex items-center gap-6 text-sm text-gray-300 mb-6 bg-gray-900/80 p-4 rounded-xl border border-gray-700 shadow-inner">
            <div class="flex flex-col">
              <span class="text-gray-500 text-xs mb-1">평점</span>
              <span class="font-bold text-yellow-400 flex items-center gap-1 text-lg">⭐ <span id="detailRating">-</span></span>
            </div>

            <div class="w-px h-10 bg-gray-700"></div>

            <div class="flex flex-col">
              <span class="text-gray-500 text-xs mb-1">방영/개봉</span>
              <span id="detailDate" class="font-medium text-base">-</span>
            </div>
          </div>
        </div>

        <div id="detailReviewArea" class="mb-8 bg-gray-700/30 p-5 rounded-xl border border-gray-600">
          <h3 class="text-sm font-bold text-gray-300 mb-3">작성된 한줄평</h3>
          <p id="detailReviewText" class="text-gray-200 text-sm leading-relaxed whitespace-pre-wrap"></p>
